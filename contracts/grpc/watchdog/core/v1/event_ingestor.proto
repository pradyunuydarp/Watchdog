syntax = "proto3";

package watchdog.core.v1;

option go_package = "github.com/pradyundevarakonda/watchdog/contracts/grpc/watchdog/core/v1;corev1";

import "watchdog/common/v1/event.proto";

// Optional direct ingestion path (Prototype A) and a useful hook for operational backfills/replays.
service EventIngestor {
  rpc SubmitEvent(SubmitEventRequest) returns (SubmitEventResponse);
}

message SubmitEventRequest {
  watchdog.common.v1.EventEnvelope event = 1;
}

message SubmitEventResponse {
  bool accepted = 1;
  string ticket_id = 2; // set when a ticket is created/updated
  string message = 3;   // human-readable status for debugging
}

