services:
  postgres:
    image: postgres:16-alpine
    container_name: watchdog-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-watchdog}
      POSTGRES_USER: ${POSTGRES_USER:-watchdog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchdog}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchdog} -d ${POSTGRES_DB:-watchdog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ./services/core-service
    environment:
      SPRING_DATASOURCE_URL: ${CORE_SERVICE_DB_URL:-jdbc:postgresql://postgres:5432/watchdog}
      SPRING_DATASOURCE_USERNAME: ${CORE_SERVICE_DB_USERNAME:-watchdog}
      SPRING_DATASOURCE_PASSWORD: ${CORE_SERVICE_DB_PASSWORD:-watchdog}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${CORE_SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  watcher-service:
    build:
      context: ./services/watcher-service
    environment:
      PORT: 8081
      PUBLISH_MODE: ${WATCHER_PUBLISH_MODE:-log}
      CORE_SERVICE_BASE_URL: http://core-service:8080
    ports:
      - "${WATCHER_SERVICE_PORT:-8081}:8081"
    depends_on:
      - core-service

  nlp-service:
    build:
      context: ./services/nlp-service
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${NLP_API_PORT:-8000}
    ports:
      - "${NLP_SERVICE_PORT:-8082}:${NLP_API_PORT:-8000}"

volumes:
  postgres-data:
