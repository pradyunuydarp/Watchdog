services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: watchdog-kafka
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  core-service:
    build:
      context: ./services/core-service
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      WATCHDOG_SECURITY_MODE: ${WATCHDOG_SECURITY_MODE:-SUPABASE}
      WATCHDOG_DB_HOST: ${SUPABASE_DB_HOST:-host.docker.internal}
      WATCHDOG_DB_PORT: ${SUPABASE_DB_PORT:-54322}
      WATCHDOG_DB_NAME: ${SUPABASE_DB_NAME:-postgres}
      WATCHDOG_DB_USERNAME: ${SUPABASE_DB_USERNAME:-postgres}
      WATCHDOG_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      WATCHDOG_AUTH_ISSUER: ${SUPABASE_AUTH_ISSUER:-http://host.docker.internal:54321/auth/v1}
      WATCHDOG_AUTH_JWK_SET_URI: ${SUPABASE_AUTH_JWK_SET_URI:-}
      WATCHDOG_AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET:-dev-only-change-me}
      WATCHDOG_AUTH_EXPECTED_AUDIENCE: ${SUPABASE_AUTH_EXPECTED_AUDIENCE:-authenticated}
      WATCHDOG_KAFKA_ENABLED: ${WATCHDOG_KAFKA_ENABLED:-true}
      WATCHDOG_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKERS:-kafka:9092}
      WATCHDOG_KAFKA_GROUP_ID: ${WATCHDOG_KAFKA_GROUP_ID:-watchdog-core-service}
      WATCHDOG_KAFKA_POINTER_TOPIC: ${WATCHDOG_KAFKA_POINTER_TOPIC:-watchdog.pointer-events.v1}
      WATCHDOG_KAFKA_ENRICHMENT_TOPIC: ${WATCHDOG_KAFKA_ENRICHMENT_TOPIC:-watchdog.enrichment-events.v1}
      WATCHDOG_KAFKA_DLQ_TOPIC: ${WATCHDOG_KAFKA_DLQ_TOPIC:-watchdog.dlq.v1}
    ports:
      - "${CORE_SERVICE_PORT:-8080}:8080"
    depends_on:
      kafka:
        condition: service_healthy

  watcher-service:
    build:
      context: ./services/watcher-service
    environment:
      PORT: 8081
      PUBLISH_MODE: ${WATCHER_PUBLISH_MODE:-kafka}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${WATCHDOG_KAFKA_POINTER_TOPIC:-watchdog.pointer-events.v1}
    ports:
      - "${WATCHER_SERVICE_PORT:-8081}:8081"
    depends_on:
      kafka:
        condition: service_healthy

  nlp-service:
    build:
      context: ./services/nlp-service
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${NLP_API_PORT:-8000}
      ANALYZER_BACKEND: ${NLP_ANALYZER_BACKEND:-heuristic}
      MODEL_ARCHITECTURE: ${NLP_MODEL_ARCHITECTURE:-gru}
      MODEL_ARTIFACT_PATH: ${NLP_MODEL_ARTIFACT_PATH:-artifacts/model-bundle.pt}
      MODEL_DEVICE: ${NLP_MODEL_DEVICE:-cpu}
      TRAINING_DATA_PATH: ${NLP_TRAINING_DATA_PATH:-data/training/incidents.jsonl}
      PLANNED_MODEL_ENCODER_NAME: ${NLP_PLANNED_MODEL_ENCODER_NAME:-set-me-later}
      PLANNED_MODEL_TOKENIZER_NAME: ${NLP_PLANNED_MODEL_TOKENIZER_NAME:-set-me-later}
      ATTENTION_NUM_HEADS: ${NLP_ATTENTION_NUM_HEADS:-8}
      TRANSFORMER_MODEL_NAME: ${NLP_TRANSFORMER_MODEL_NAME:-set-me-later}
    ports:
      - "${NLP_SERVICE_PORT:-8082}:${NLP_API_PORT:-8000}"
    volumes:
      - ./services/nlp-service/artifacts:/app/artifacts
    depends_on:
      kafka:
        condition: service_healthy

  dashboard:
    build:
      context: ./services/dashboard
    environment:
      VITE_DASHBOARD_API_MODE: ${VITE_DASHBOARD_API_MODE:-mock}
      VITE_DASHBOARD_API_BASE_URL: ${VITE_DASHBOARD_API_BASE_URL:-http://localhost:8080}
      VITE_DASHBOARD_REFRESH_MS: ${VITE_DASHBOARD_REFRESH_MS:-15000}
    ports:
      - "${DASHBOARD_PORT:-4173}:4173"
    depends_on:
      core-service:
        condition: service_started

volumes: {}
